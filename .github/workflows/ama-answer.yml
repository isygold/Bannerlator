name: "🤖 AMA — Answer the AI"

# SECURITY MODEL (public repo):
# - Trigger is `labeled`, gated to the `question` label. On a public repo only
#   users with triage/write/maintain/admin can add labels, so this is a
#   human-in-the-loop approval gate — a random visitor cannot self-trigger a run
#   (the issue template deliberately does NOT auto-apply `question`).
# - All untrusted text (issue body, derived question, model answer) is passed via
#   `env:` and referenced as a quoted variable. It is NEVER inlined into a `run:`
#   or `script:` body with ${{ }} — that would be a shell/JS injection vector.
# - opencode runs with bash/write/edit/webfetch disabled (see .claude/agents/
#   ama-agent.md), so a prompt-injected question cannot shell out, write files, or
#   exfiltrate over the network. The answer is also scrubbed of key-like strings
#   before posting as a defense-in-depth backstop.

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

concurrency:
  group: ama-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  answer:
    if: github.event.label.name == 'question'
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
    - name: Check out repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        # Don't leave the GITHUB_TOKEN in the runner's local .git/config. opencode
        # never needs to push, and this removes the only place a sandbox escape
        # could even read the (already read-only-on-code) token.
        persist-credentials: false

    - name: Extract question from issue
      id: question
      env:
        # Untrusted. Only ever referenced as the quoted shell var "$BODY".
        BODY: ${{ github.event.issue.body }}
      run: |
        QUESTION=$(printf '%s' "$BODY" \
          | sed '/^### Your question$/d' \
          | sed '/^[[:space:]]*$/d')
        if [ -z "$QUESTION" ]; then
          QUESTION=$(printf '%s' "$BODY")
        fi
        QUESTION=$(printf '%s' "$QUESTION" | head -c 4000)
        {
          echo "q<<__Q_EOF__"
          printf '%s\n' "$QUESTION"
          echo "__Q_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Install opencode
      run: npm install -g opencode@latest 2>&1 | tail -3

    - name: Configure opencode credentials
      id: creds
      env:
        OPENCODE_AUTH: ${{ secrets.OPENCODE_AUTH }}
      run: |
        if [ -z "$OPENCODE_AUTH" ]; then
          echo "status=no-auth" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        mkdir -p ~/.local/share/opencode
        ( umask 177; printf '%s' "$OPENCODE_AUTH" > ~/.local/share/opencode/auth.json )
        echo "status=ok" >> "$GITHUB_OUTPUT"

    - name: Answer via opencode big-pickle
      id: answer
      if: steps.creds.outputs.status == 'ok'
      env:
        # Untrusted. Passed only as a single quoted argument to opencode.
        Q: ${{ steps.question.outputs.q }}
      run: |
        OUTPUT=$(opencode run "$Q" \
          --agent ama-agent \
          --model opencode/big-pickle \
          --format json \
          --pure \
          2>/dev/null || true)

        ANSWER=$(printf '%s' "$OUTPUT" | jq -s '
          [.[] | select(.type == "text" and .part.type == "text") | .part.text]
          | join("\n\n")
        ' --raw-output 2>/dev/null || true)

        if [ -z "$ANSWER" ] || [ "$ANSWER" = "null" ]; then
          ANSWER="⚠️ No answer generated. The AI may have timed out or hit an error."
        fi

        # Defense in depth: scrub anything that looks like a secret key before it
        # can reach a public comment, in case a prompt injection coaxed one out.
        ANSWER=$(printf '%s' "$ANSWER" | sed -E 's/sk-[A-Za-z0-9_-]{16,}/[redacted]/g')

        {
          echo "ans<<__ANS_EOF__"
          printf '%s\n' "$ANSWER"
          echo "__ANS_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Remove credentials from runner
      if: always()
      run: rm -f ~/.local/share/opencode/auth.json

    - name: Post answer as comment
      if: always()
      uses: actions/github-script@v7
      env:
        # Passed as env data, not interpolated into the script body.
        STATUS: ${{ steps.creds.outputs.status }}
        ANSWER: ${{ steps.answer.outputs.ans }}
      with:
        script: |
          const status = process.env.STATUS;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          if (status === 'no-auth') {
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: [
                '## 🤖 Bannerlator AI',
                '',
                "⚠️ The **OPENCODE_AUTH** secret hasn't been configured yet.",
                '',
                '**For the repo owner:**',
                '1. Run locally: `cat ~/.local/share/opencode/auth.json`',
                '2. Copy the entire JSON object',
                '3. **Settings → Secrets and variables → Actions → New repository secret**',
                '4. Name it `OPENCODE_AUTH`, paste the JSON, save',
                '',
                'Then remove and re-add the `question` label to retry.',
              ].join('\n'),
            });
            return;
          }

          const answer = process.env.ANSWER || '⚠️ No answer generated.';
          await github.rest.issues.createComment({
            owner, repo, issue_number,
            body: [
              '## 🤖 Bannerlator AI',
              '',
              answer,
              '',
              '---',
              `_Cited from the [Bannerlator codebase](https://github.com/${owner}/${repo}). For a follow-up, a maintainer removes and re-adds the \`question\` label to re-run._`,
            ].join('\n'),
          });

          // Reset state so re-adding `question` triggers a fresh run.
          try {
            await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'question' });
          } catch (e) { /* label may already be gone */ }
          await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['answered'] });
