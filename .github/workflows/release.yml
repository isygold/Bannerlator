name: Nightly Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''
      release_tag:
        description: 'Release tag (e.g. 1.7, 1.8)'
        required: true
        default: '1.0'
      release_title:
        description: 'Release title (e.g. Bannerlator 1.0)'
        required: true
        default: 'Bannerlator 1.0'
      release_number:
        description: 'Release number for APK name (e.g. 1.7, 1.9-pre1)'
        required: true
        default: '1.0'
      make_prerelease:
        description: 'Pre-release? (true = beta build, not offered to stable users)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 20

    - name: Set up JDK 17 (preinstalled toolchain, no apt)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Gradle (dependency + build cache)
      uses: gradle/actions/setup-gradle@v4

    - name: Resolve JavaSteam upstream commit (for cache key)
      id: jsref
      run: |
        SHA=$(git ls-remote https://github.com/joshuatam/JavaSteam gamenative-latest 2>/dev/null | head -1 | cut -f1)
        [ -z "$SHA" ] && SHA="unknown"
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        echo "JavaSteam gamenative-latest = $SHA"

    - name: Cache JavaSteam JARs
      id: cache-javasteam
      uses: actions/cache@v4
      with:
        path: app/libs/steam
        key: javasteam-${{ steps.jsref.outputs.sha }}

    - name: Build JavaSteam and copy JARs to app/libs/steam
      if: steps.cache-javasteam.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 -b gamenative-latest https://github.com/joshuatam/JavaSteam javasteam_src
        cd javasteam_src

        HW_FILE=$(find . -name "HardwareUtils.java" 2>/dev/null | head -1)
        if [ -n "$HW_FILE" ]; then
          sed -i 's/SystemUtils\.IS_OS_ANDROID/false/g' "$HW_FILE"
        fi

        UTILS_FILE=$(find . -name "Utils.java" -path "*/javasteam/*" 2>/dev/null | head -1)
        if [ -n "$UTILS_FILE" ]; then
          sed -i \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_SONOMA/false/g' \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_VENTURA/false/g' \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_MONTEREY/false/g' \
            -e 's/SystemUtils\.IS_OS_MAC_OSX_BIG_SUR/false/g' \
            -e 's/SystemUtils\.IS_OS_WINDOWS_11/false/g' \
            "$UTILS_FILE"
        fi

        ./gradlew jar --no-daemon 2>&1 | tail -20

        MAIN_JAR=""
        for j in $(find . -name "*.jar" -path "*/build/libs/*" \
            | grep -v "sources\|javadoc\|test" | sort); do
          if jar tf "$j" 2>/dev/null | grep -q "SteamClient.class"; then
            MAIN_JAR="$j"
            break
          fi
        done
        if [ -z "$MAIN_JAR" ]; then
          MAIN_JAR=$(find . -name "*.jar" -path "*/build/libs/*" \
            | grep -v "sources\|javadoc\|test" \
            | while read f; do echo "$(wc -c < "$f") $f"; done \
            | sort -rn | head -1 | cut -d' ' -f2-)
        fi

        DD_JAR=$(find . -name "javasteam-depotdownloader-*.jar" -path "*/build/libs/*" \
          ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)

        mkdir -p ../app/libs/steam
        cp "$MAIN_JAR" ../app/libs/steam/javasteam.jar

        PROTO_JAR=$(find ~/.gradle/caches -name "protobuf-java-*.jar" \
          ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
        [ -n "$PROTO_JAR" ] && cp "$PROTO_JAR" ../app/libs/steam/protobuf-java.jar

        LANG3_JAR=$(find ~/.gradle/caches -name "commons-lang3-*.jar" \
          ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
        if [ -n "$LANG3_JAR" ]; then
          cp "$LANG3_JAR" ../app/libs/steam/commons-lang3.jar
        else
          wget -q "https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.14.0/commons-lang3-3.14.0.jar" \
            -O ../app/libs/steam/commons-lang3.jar
        fi

        if [ -n "$DD_JAR" ] && [ -s "$DD_JAR" ]; then
          cp "$DD_JAR" ../app/libs/steam/javasteam-depotdownloader.jar
          GRADLE_CACHE=~/.gradle/caches/modules-2/files-2.1
          gather_jar() {
            local pattern="$1" dest="$2"
            local found
            found=$(find "$GRADLE_CACHE" -name "$pattern" \
              ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
            [ -n "$found" ] && cp "$found" "$dest"
          }
          gather_jar "ktor-client-cio-jvm-*.jar"            "../app/libs/steam/ktor-client-cio.jar"
          gather_jar "ktor-client-core-jvm-*.jar"           "../app/libs/steam/ktor-client-core.jar"
          gather_jar "ktor-io-jvm-*.jar"                    "../app/libs/steam/ktor-io.jar"
          gather_jar "ktor-http-jvm-*.jar"                  "../app/libs/steam/ktor-http.jar"
          gather_jar "ktor-utils-jvm-*.jar"                 "../app/libs/steam/ktor-utils.jar"
          gather_jar "ktor-network-jvm-*.jar"               "../app/libs/steam/ktor-network.jar"
          gather_jar "ktor-network-tls-jvm-*.jar"           "../app/libs/steam/ktor-network-tls.jar"
          gather_jar "kotlinx-serialization-json-jvm-*.jar" "../app/libs/steam/kotlinx-serialization-json.jar"
          gather_jar "kotlinx-serialization-core-jvm-*.jar" "../app/libs/steam/kotlinx-serialization-core.jar"
          gather_jar "kotlinx-io-core-jvm-*.jar"            "../app/libs/steam/kotlinx-io-core.jar"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache NDK + cmake
      id: cache-ndk
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
          ${{ env.ANDROID_SDK_ROOT }}/cmake/3.22.1
        key: ndk-26.1.10909125-cmake-3.22.1

    - name: Install NDK (only if not cached) + export ANDROID_NDK_HOME
      run: |
        SDK_ROOT="${ANDROID_SDK_ROOT}"
        mkdir -p "$SDK_ROOT"
        if [ ! -f "$SDK_ROOT/ndk/26.1.10909125/source.properties" ]; then
          if [ ! -f "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools/
            mkdir -p "$SDK_ROOT/cmdline-tools"
            mv /tmp/cmdline-tools/cmdline-tools "$SDK_ROOT/cmdline-tools/latest" 2>/dev/null || true
            rm -f /tmp/cmdline-tools.zip
          fi
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;26.1.10909125" "cmake;3.22.1"
        else
          echo "NDK already present (cache hit) — skipping sdkmanager install"
        fi
        echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Grant execute permission for build script
      run: chmod +x build-lsfg-android.sh

    - name: Cache LSFG native library
      id: cache-lsfg
      uses: actions/cache@v4
      with:
        path: app/src/main/jniLibs/arm64-v8a/libVkLayer_LSFGVK_frame_generation.so
        key: lsfg-${{ hashFiles('app/src/main/cpp/lsfg-vk/**', 'build-lsfg-android.sh') }}

    - name: Build LSFG native library (only if not cached)
      if: steps.cache-lsfg.outputs.cache-hit != 'true'
      run: ./build-lsfg-android.sh

    - name: Build with Gradle
      # Serialize per-flavor packaging: building all 3 ~588MB APKs in parallel
      # OOM-kills the runner (exit 143). --no-parallel + --max-workers=1 + a
      # larger Gradle heap package one at a time. (Mirrors build-artifacts.yml.)
      run: ./gradlew assembleRelease --no-parallel --max-workers=1 -Dorg.gradle.jvmargs="-Xmx5g -XX:MaxMetaspaceSize=1g"

    - name: Get version info
      run: |
        echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "VERSION=$(grep versionName app/build.gradle | head -1 | cut -d '"' -f 2)" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

    - name: Rename APKs
      run: |
        N="${{ github.event.inputs.release_number }}"
        mv app/build/outputs/apk/standard/release/app-standard-release.apk \
           app/build/outputs/apk/standard/release/Bannerlator-${N}-standard.apk
        mv app/build/outputs/apk/ludashi/release/app-ludashi-release.apk \
           app/build/outputs/apk/ludashi/release/Bannerlator-${N}-ludashi.apk
        mv app/build/outputs/apk/pubg/release/app-pubg-release.apk \
           app/build/outputs/apk/pubg/release/Bannerlator-${N}-pubg.apk

    - name: Generate update.json
      # Drives the in-app updater (UpdateManager). The app fetches this from
      # releases/latest/download/update.json; because make_latest=true +
      # prerelease=false below, only stable cuts ever change it.
      run: |
        VERSION_CODE=$(grep versionCode app/build.gradle | head -1 | grep -oE '[0-9]+' | head -1)
        N="${{ github.event.inputs.release_number }}"
        NOTES="${{ github.event.inputs.release_notes }}"
        [ -z "$NOTES" ] && NOTES="${{ github.event.inputs.release_title }}"
        jq -n \
          --argjson vc "$VERSION_CODE" \
          --arg vn "$VERSION" \
          --arg notes "$NOTES" \
          --arg std "Bannerlator-${N}-standard.apk" \
          --arg lud "Bannerlator-${N}-ludashi.apk" \
          --arg pbg "Bannerlator-${N}-pubg.apk" \
          '{versionCode:$vc, versionName:$vn, notes:$notes, minSupported:1,
            apk:{"com.winlator.banner":$std,"com.ludashi.benchmark":$lud,"com.tencent.ig":$pbg}}' \
          > update.json
        echo "Generated update.json:"; cat update.json

    - name: Generate changelog table
      run: |
        {
          echo "## Changelog"
          echo ""
          echo "| Commit | Title |"
          echo "|--------|--------|"
          git log -n 10 --pretty=format:"| \`%h\` | %s |"
        } > changelog.md

        {
          echo "CHANGELOG<<__CHANGELOG_EOF__"
          cat changelog.md
          echo ""
          echo "__CHANGELOG_EOF__"
        } >> "$GITHUB_ENV"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        name: ${{ github.event.inputs.release_title }}
        body: |
          <img src="https://github.com/The412Banner/Bannerlator/blob/main/logo.jpg" width="1500" height="500" alt="Bannerlator" />
          </p>

          ${{ env.CHANGELOG }}

          ${{ github.event.inputs.release_notes }}
        files: |
          app/build/outputs/apk/standard/release/Bannerlator-${{ github.event.inputs.release_number }}-standard.apk
          app/build/outputs/apk/ludashi/release/Bannerlator-${{ github.event.inputs.release_number }}-ludashi.apk
          app/build/outputs/apk/pubg/release/Bannerlator-${{ github.event.inputs.release_number }}-pubg.apk
          update.json
        prerelease: ${{ github.event.inputs.make_prerelease == 'true' }}
        # Only a stable cut becomes "latest"; pre-releases never do, so the
        # default (toggle-off) updater keeps pointing at the last stable.
        make_latest: ${{ github.event.inputs.make_prerelease != 'true' }}
